<!DOCTYPE html>
<html>
<head>
    <title>Act 1 — Hero</title>
    <link rel="icon" href="lany.png" type="image/png">
    <link rel="stylesheet" href="theme.css">
    <style>
        .hero-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 64px);
        }
        .hero-left {
            background: var(--gray);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px;
            border-right: 1px solid #1e1e1e;
            position: relative;
            overflow: hidden;
        }
        .hero-left::before {
            content: 'Zara La';
            position: absolute;
            top: -20px;
            left: -10px;
            font-size: 180px;
            font-weight: 900;
            color: #111;
            line-height: 1;
            pointer-events: none;
            user-select: none;
        }
        .hero-eyebrow {
            font-size: 10px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--pink);
            font-family: Arial, sans-serif;
            margin-bottom: 20px;
            position: relative;
        }
        .hero-title {
            font-size: clamp(52px, 6vw, 96px);
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
            color: var(--white);
            position: relative;
            margin-bottom: 40px;
        }
        .hero-title em {
            display: block;
            font-style: italic;
            color: var(--pink);
            font-weight: 400;
            letter-spacing: 0px;
        }
        .hero-actions { display: flex; gap: 0; position: relative; }
        .btn-play {
            background: var(--pink);
            color: var(--black);
            border: none;
            padding: 18px 40px;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-play:hover { background: var(--pink-light); }
        .btn-explore {
            background: transparent;
            color: var(--white);
            border: 1px solid #333;
            border-left: none;
            padding: 18px 40px;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            cursor: pointer;
            transition: border-color 0.3s, color 0.3s;
        }
        .btn-explore:hover { border-color: var(--pink); color: var(--pink); }
        .hero-right {
            background: url('lany.png') center/cover no-repeat;
            position: relative;
        }
        .hero-right::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(26,26,26,0.4), transparent);
        }
        .hero-counter {
            position: absolute;
            bottom: 80px;
            right: 80px;
            z-index: 2;
            text-align: right;
        }
        .hero-counter span {
            display: block;
            font-size: 64px;
            font-weight: 900;
            color: var(--pink);
            line-height: 1;
            opacity: 0.4;
        }
        .hero-counter p {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--white);
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
<nav>
    <div class="nav-logo">LANY <span>Music</span></div>
    <div class="nav-links">
        <a href="act 5.html" class="active">Hero</a>
        <a href="act 4.html">Audio</a>
        <a href="act  2.html">Buttons</a>
        <a href="act 3.html">Hover</a>
    </div>
</nav>

<div class="hero-wrap">
    <div class="hero-left">
        <p class="hero-eyebrow">✦ Now Playing — Midnight Sun</p>
        <h1 class="hero-title">Discover<br>the <em>Sound</em><br>of Zara Larsson</h1>
        <div class="hero-actions">
            <button class="btn-play">▶ Play Now</button>
            <button class="btn-explore">Explore Albums</button>
        </div>
    </div>
    <div class="hero-right">
        <div class="hero-counter">
            <span>01</span>
            <p>Hero Section</p>
        </div>
    </div>
</div>

</body>
</html>
